<script>
// LOADER
const loader=document.getElementById('loader'),loaderInner=document.getElementById('loaderInner'),pageContent=document.getElementById('page-content');
setTimeout(()=>{loaderInner.classList.add('hide');},1100);
setTimeout(()=>{loader.classList.add('open');pageContent.classList.add('visible');},1350);
setTimeout(()=>{loader.classList.add('done');loader.style.display='none';},2400);

// HAMBURGER
const ham=document.getElementById('ham'),mobNav=document.getElementById('mobNav');
ham.addEventListener('click',()=>{ham.classList.toggle('open');mobNav.classList.toggle('open');});
function closeMob(){ham.classList.remove('open');mobNav.classList.remove('open');}

// CURSOR
const cur=document.getElementById('cur'),ring=document.getElementById('ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function loop(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('a,.social-btn,.form-btn,.btn-talk,.info-icon').forEach(el=>{
  el.addEventListener('mouseenter',()=>ring.classList.add('g'));
  el.addEventListener('mouseleave',()=>ring.classList.remove('g'));
});

// FORM SUBMIT
function handleSubmit(e){
  e.preventDefault();
  const btn=e.target;
  const span=btn.querySelector('span');
  span.textContent='Sending...';
  setTimeout(()=>{
    span.textContent='Message Sent ✓';
    btn.style.background='#1a3a1a';
    btn.style.borderColor='#2a6a2a';
    setTimeout(()=>{
      span.textContent='Send Message';
      btn.style.background='';
      btn.style.borderColor='';
    },3000);
  },1200);
}

// TILT on form card
document.querySelectorAll('.form-card').forEach(c=>{
  c.addEventListener('mousemove',e=>{
    const r=c.getBoundingClientRect(),x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;
    c.style.transform=`rotateX(${-y*3}deg) rotateY(${x*3}deg)`;
    c.style.transition='transform .08s';
  });
  c.addEventListener('mouseleave',()=>{c.style.transform='';c.style.transition='transform .6s cubic-bezier(.22,1,.36,1)';});
});
</script>
